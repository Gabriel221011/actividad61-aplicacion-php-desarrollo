version: '3.8'
services:
  db:
    image: mariadb:10.6
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "GabrielCalvo@2006"
      MYSQL_DATABASE: "clash_royale"
      MYSQL_USER: "usuarioGCalvo"
      MYSQL_PASSWORD: "GabrielCalvo@2006"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"

  web:
    build: .
    depends_on:
      - db
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html:cached
    environment:
      DB_HOST: db
      DB_NAME: clash_royale
      DB_USER: usuarioGCalvo
      DB_PASS: GabrielCalvo@2006

  # servicio opcional de proxy inverso para cuando se despliegue en un host
  # El contenedor proxy escucha en los puertos 80 y 443 y reenvía al servicio web.
  proxy:
    image: nginx:latest
    restart: always
    depends_on:
      - web
    ports:
      - "80:80"    # HTTP público
      - "443:443"  # HTTPS público
    volumes:
      - ./conf/nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/ssl:ro

  # servicio que ejecuta periódicamente el script de actualización DDNS
  ddns:
    image: alpine:latest
    restart: always
    depends_on:
      - web
    volumes:
      - ./update-ddns.sh:/usr/local/bin/update-ddns.sh:ro
      - ./.env:/home/.env:ro
    working_dir: /home
    entrypoint: /bin/sh
    command: ["-c","apk add --no-cache curl && while true; do /usr/local/bin/update-ddns.sh; sleep 300; done"]

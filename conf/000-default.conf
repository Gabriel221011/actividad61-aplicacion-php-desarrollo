<VirtualHost *:80>
    # Dominio público asociado a la aplicación según la tarea
    # Gabriel Calvo Aja → iniciales "gca" y temática "clashroyale"
    ServerName clashroyale-gca.ddns.net
    ServerAlias clashroyale.local
    ServerAlias localhost
    ServerAlias *.local
    DocumentRoot /var/www/html
    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

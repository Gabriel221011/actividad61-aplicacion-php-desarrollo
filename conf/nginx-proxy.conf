# Configuración del proxy inverso para el dominio dinámico
# La temática es "clashroyale" y las iniciales son "gca".
# Ajusta los ficheros de certificado en el volumen correspondiente.

server {
    listen 80;
    server_name clashroyale-gca.ddns.net;

    location / {
        proxy_pass http://web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 443 ssl;
    server_name clashroyale-gca.ddns.net;

    # certificados (colócalos en /certs dentro del contenedor)
    ssl_certificate     /etc/ssl/certs/server.crt;
    ssl_certificate_key /etc/ssl/private/server.key;

    location / {
        proxy_pass http://web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
